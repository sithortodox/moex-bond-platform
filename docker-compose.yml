services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moex
      POSTGRES_PASSWORD: moex123
      POSTGRES_DB: moex_bonds
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moex"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
      - "8502:8502"
    environment:
      DATABASE_URL: postgresql://moex:moex123@db:5432/moex_bonds
    volumes:
      - ./data:/app/data
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./data_collector.py:/app/data_collector.py
      - ./.streamlit:/app/.streamlit
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
