name: Deploy to VPS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install sshpass and deploy
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p 'tU6OM0!3xgZk' ssh -o StrictHostKeyChecking=no root@217.114.2.4 << 'REMOTE'
          set -e
          echo "=== Step 1: Packages ==="
          apt-get update -qq 2>&1 | tail -1
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3.12 python3.12-venv python3.12-dev postgresql postgresql-contrib nginx git curl certbot python3-certbot-nginx 2>&1 | tail -3
          echo "=== Step 2: PostgreSQL ==="
          systemctl enable --now postgresql
          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='moex'" | grep -q 1 || sudo -u postgres psql -c "CREATE USER moex WITH PASSWORD 'moex123';"
          sudo -u postgres psql -lqt | cut -d\| -f1 | grep -qw moex_bonds || sudo -u postgres psql -c "CREATE DATABASE moex_bonds OWNER moex;"
          sudo -u postgres psql -d moex_bonds -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" 2>/dev/null || true
          echo "=== Step 3: Clone ==="
          rm -rf /opt/moex-bond-platform
          git clone https://github.com/sithortodox/moex-bond-platform.git /opt/moex-bond-platform 2>&1 | tail -1
          echo "=== Step 4: Venv ==="
          python3.12 -m venv /opt/moex-bond-platform/venv
          /opt/moex-bond-platform/venv/bin/pip install --upgrade pip -q
          /opt/moex-bond-platform/venv/bin/pip install -r /opt/moex-bond-platform/requirements.txt -q 2>&1 | tail -3
          echo "=== Step 5: Schema ==="
          sudo -u postgres psql -d moex_bonds -f /opt/moex-bond-platform/schema.sql 2>&1 | tail -3
          echo "=== Step 6: Service ==="
          echo '[Unit]
          Description=MOEX Bond Screener
          After=network.target postgresql.service
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/moex-bond-platform
          Environment=DATABASE_URL=postgresql://moex:moex123@localhost:5432/moex_bonds
          Environment=PATH=/opt/moex-bond-platform/venv/bin:/usr/local/bin:/usr/bin:/bin
          ExecStart=/opt/moex-bond-platform/venv/bin/streamlit run /opt/moex-bond-platform/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false --browser.gatherUsageStats false
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target' > /etc/systemd/system/moex-bond-screener.service
          systemctl daemon-reload
          systemctl enable moex-bond-screener
          systemctl start moex-bond-screener
          echo "=== Step 7: Nginx ==="
          echo 'server {
              listen 80;
              server_name finpa.ru www.finpa.ru;
              location / {
                  proxy_pass http://127.0.0.1:8501;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 86400;
              }
              client_max_body_size 50M;
          }' > /etc/nginx/sites-available/moex-bond-screener
          ln -sf /etc/nginx/sites-available/moex-bond-screener /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default
          nginx -t 2>&1
          systemctl reload nginx
          echo "=== Step 8: SSL ==="
          sleep 15
          curl -sf http://localhost:8501/_stcore/health && echo " Streamlit OK"
          certbot --nginx -d finpa.ru -d www.finpa.ru --non-interactive --agree-tos --email Aktiv0999@gmail.com 2>&1 || true
          echo "=== Step 9: Data ==="
          nohup /opt/moex-bond-platform/venv/bin/python3.12 /opt/moex-bond-platform/data_collector.py >> /var/log/moex-collector.log 2>&1 &
          (crontab -l 2>/dev/null; echo "0 2 * * * /opt/moex-bond-platform/venv/bin/python3.12 /opt/moex-bond-platform/data_collector.py >> /var/log/moex-collector.log 2>&1") | crontab -
          echo "=== DEPLOY COMPLETE ==="
          REMOTE
