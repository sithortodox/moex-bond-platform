name: Deploy to VPS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Copy deploy script
        run: sshpass -p 'tU6OM0!3xgZk' scp -o StrictHostKeyChecking=no deploy.sh root@217.114.2.4:/tmp/deploy.sh
      - name: Run deploy script
        run: sshpass -p 'tU6OM0!3xgZk' ssh -o StrictHostKeyChecking=no root@217.114.2.4 'bash /tmp/deploy.sh && echo DEPLOY_OK'
